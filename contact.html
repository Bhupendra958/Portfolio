<!DOCTYPE html>
<html lang="en">

<title>Contact | Bhupendra</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

/* background */

body{
background:linear-gradient(135deg,#050c2b,#17223c,#1e293b);
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

/* particles */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

/* mouse glow */

.glow{
position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle,rgba(59,130,246,0.25),transparent 60%);
border-radius:50%;
pointer-events:none;
z-index:-1;
transform:translate(-50%,-50%);
}

/* navbar */

nav{
background:#050d30;
border-bottom:1px solid #1e293b;
}

/* floating icons */

.float-icon{
position:absolute;
animation:float 6s ease-in-out infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0px);}
}

/* animated icon */

.social-icon{
transition:0.4s;
animation:iconFloat 4s infinite ease-in-out;
}

@keyframes iconFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* cards */

.contact-card{
background:#0f172a;
border-radius:16px;
padding:28px;
transition:0.4s;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.contact-card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:
0 0 15px #3b82f6,
0 0 30px #3b82f6,
0 0 50px #3b82f6;
background:#1e293b;
}

/* button */

.copy-btn{
margin-top:8px;
padding:6px 14px;
background:#2563eb;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

.copy-btn:hover{
background:#3b82f6;
}

.heading{
color:#60a5fa;
}

</style>

</head>

<body>

<div id="particles-js"></div>
<div class="glow" id="glow"></div>

<!-- FLOATING ICONS -->

class="float-icon w-12 top-32 left-10">

class="float-icon w-12 top-72 right-16">

<img src="https://img.icons8.com/color/96/linkedin.png"
class="float-icon w-12 bottom-40 left-20">

<img src="https://img.icons8.com/color/96/github.png"
class="float-icon w-12 bottom-24 right-20">



<!-- NAVBAR -->

<nav class="fixed w-full shadow-md z-50">

<div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-4">

<h1 class="text-2xl font-bold text-blue-400">
N.Bhupendra Chowdary
</h1>

<div class="space-x-8 font-semibold text-blue-300">

<a href="index.html" class="hover:text-blue-500">Home</a>

<a href="projects.html" class="hover:text-blue-500">Projects</a>

Contact Me

<!-- EMAIL -->

<div class="contact-card">

<img src="https://img.icons8.com/color/96/email.png"
class="mx-auto w-16 mb-4 social-icon">

<p id="emailText">nbhupendra958@gmail.com</p>

Copy Email

<!-- PHONE -->

<script>

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:2},
line_linked:{enable:true,opacity:0.2}
}
});

/* mouse glow */

const glow=document.getElementById("glow");

document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

/* copy email */

function copyEmail(){

let text=document.getElementById("emailText").innerText;

navigator.clipboard.writeText(text);

let btn=document.getElementById("emailBtn");

btn.innerText="Copied!";

setTimeout(()=>{
btn.innerText="Copy Email";
},2000);

}

/* copy phone */

function copyPhone(){

let text=document.getElementById("phoneText").innerText;

navigator.clipboard.writeText(text);

let btn=document.getElementById("phoneBtn");

btn.innerText="Copied!";

setTimeout(()=>{
btn.innerText="Copy Phone";
},2000);

}

</script>

</body>
